<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Register - Medicare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h2 class="mb-3">Login or Register</h2>
            <div class="mb-4">
              <button id="showLogin" class="btn btn-outline-primary me-2">Login</button>
              <button id="showRegister" class="btn btn-primary">Register</button>
            </div>

            <div id="loginForm">
              <h5>Login</h5>
              <div class="mb-3">
                <label class="form-label">Email / Username</label>
                <input type="text" id="loginEmail" class="form-control" />
                <div class="form-text">Use your email for patients/doctors and username for admin.</div>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="loginPassword" class="form-control" />
              </div>
              <div class="mb-3">
                <label class="form-label">Role</label>
                <select id="loginRole" class="form-select">
                  <option value="patient">Patient</option>
                  <option value="doctor">Doctor</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
              <button id="loginButton" class="btn btn-primary">Sign In</button>
            </div>

            <div id="registerForm" class="d-none">
              <h5>Register</h5>
              <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" id="registerName" class="form-control" />
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="registerEmail" class="form-control" />
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="registerPassword" class="form-control" />
              </div>
              <div class="mb-3">
                <label class="form-label">Role</label>
                <select id="registerRole" class="form-select">
                  <option value="patient">Patient</option>
                  <option value="doctor">Doctor</option>
                </select>
              </div>
              <div id="doctorFields" class="d-none">
                <div class="mb-3">
                  <label class="form-label">Specialization</label>
                  <input type="text" id="registerSpecialization" class="form-control" />
                </div>
                <div class="mb-3">
                  <label class="form-label">Contact</label>
                  <input type="text" id="registerContact" class="form-control" />
                </div>
                <div class="mb-3">
                  <label class="form-label">Availability</label>
                  <input type="text" id="registerAvailability" class="form-control" placeholder="e.g. Mon-Fri 10am-4pm" />
                </div>
              </div>
              <button id="registerButton" class="btn btn-success">Create Account</button>
            </div>

            <div id="alertBox" class="alert d-none mt-4" role="alert"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
